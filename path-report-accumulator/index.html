<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Pathology Report Accumulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gray: { 850: '#1a2030', 950: '#0d1117' } }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-5 py-4">
    <div class="flex items-center justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-xl font-bold text-gray-100">Pathology Report Accumulator</h1>
        <p class="text-xs text-gray-400 mt-0.5">Cumulative pathology results viewer</p>
      </div>

      <!-- Server selector -->
      <div class="flex items-center gap-2 flex-wrap">
        <label class="text-xs text-gray-500">FHIR Server</label>
        <select id="serverPreset" class="bg-gray-800 text-gray-200 text-sm rounded-lg px-3 py-1.5
                       border border-gray-700 focus:border-blue-500 focus:outline-none">
          <option value="">Choose a preset…</option>
        </select>
        <input id="serverCustom" type="url" placeholder="Or type a custom URL"
               class="bg-gray-800 text-gray-200 text-sm rounded-lg px-3 py-1.5 w-64
                      border border-gray-700 focus:border-blue-500 focus:outline-none" />
        <button id="loadBtn"
                class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium px-4 py-1.5
                       rounded-lg transition-colors">
          Load Patients
        </button>
        <span id="status" class="text-xs text-gray-400 ml-2"></span>
      </div>
    </div>
  </header>

  <!-- Main three-panel layout -->
  <div class="flex-1 flex overflow-hidden">

    <!-- Left: Patient list -->
    <aside class="w-56 shrink-0 border-r border-gray-800 flex flex-col bg-gray-900">
      <div class="p-3 border-b border-gray-800">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Patients</h2>
        <!-- Search toggle -->
        <div class="flex gap-1 mb-2">
          <button id="browseAllBtn"
                  class="mode-btn active flex-1 text-xs px-2 py-1 rounded border border-gray-700
                         transition-colors">Browse</button>
          <button id="searchBtn"
                  class="mode-btn flex-1 text-xs px-2 py-1 rounded border border-gray-700
                         text-gray-400 transition-colors">Search</button>
        </div>
        <input id="patientSearch" type="text" placeholder="Patient name…"
               class="hidden w-full bg-gray-800 text-gray-200 text-sm rounded px-2 py-1
                      border border-gray-700 focus:border-blue-500 focus:outline-none" />
      </div>
      <div id="patientList" class="panel-scroll flex-1 p-2 space-y-1"></div>
    </aside>

    <!-- Middle: Report list -->
    <aside class="w-52 shrink-0 border-r border-gray-800 flex flex-col bg-gray-900">
      <div class="p-3 border-b border-gray-800">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Reports</h2>
      </div>
      <div id="reportList" class="panel-scroll flex-1 p-2 space-y-1">
        <p class="text-gray-500 text-xs p-3">Select a patient</p>
      </div>
    </aside>

    <!-- Right: Cumulative results -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <!-- Patient banner -->
      <div id="patientBanner" class="px-4 pt-3"></div>

      <!-- Toolbar: display mode + sort -->
      <div id="tableToolbar" class="hidden px-4 py-2 flex items-center gap-3 flex-wrap">
        <span class="text-xs text-gray-500">Display:</span>
        <div class="flex gap-1" id="modeButtons">
          <button class="mode-btn active text-xs px-3 py-1 rounded border border-gray-700 transition-colors"
                  data-mode="compact">Compact</button>
          <button class="mode-btn text-xs px-3 py-1 rounded border border-gray-700 text-gray-400 transition-colors"
                  data-mode="simple">Simple</button>
          <button class="mode-btn text-xs px-3 py-1 rounded border border-gray-700 text-gray-400 transition-colors"
                  data-mode="lab-specific">Lab Specific</button>
          <button class="mode-btn text-xs px-3 py-1 rounded border border-gray-700 text-gray-400 transition-colors"
                  data-mode="method-specific">Method Specific</button>
        </div>
        <div class="ml-auto flex items-center gap-2">
          <span class="text-xs text-gray-500">Sort:</span>
          <button id="sortToggle"
                  class="text-xs px-3 py-1 rounded border border-gray-700 text-gray-300
                         hover:bg-gray-700 transition-colors">
            Newest &#8594; Oldest
          </button>
        </div>
      </div>

      <!-- Table area -->
      <div id="cumulativeTable" class="flex-1 overflow-auto px-4 pb-4">
        <p class="text-gray-500 text-sm p-4">Select a patient and report to view cumulative results</p>
      </div>
    </main>
  </div>

  <!-- Toasts -->
  <div class="toast-wrap fixed bottom-4 right-4 space-y-2 z-50" id="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
